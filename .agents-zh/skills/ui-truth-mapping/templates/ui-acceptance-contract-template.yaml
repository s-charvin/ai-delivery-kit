# ── 契约头部 ────────────────────────────────────────────────
# 这是 1:1 实现的规范化 UI 真值。
# 每个填充值必须有 Figma 结构化数据作为源依据。
# 空字段（null、{}、[]）表示“无证据 — 不要编造”。

version: 1
contract_id: "<subreq-id>"

source:
  requirement: "requirement-slice.md"
  design_file: "<figma-file-key>"
  root_node: "<figma-root-node-id>"
  cache: "<figma-cache-path>"

# ── 状态 ─────────────────────────────────────────────────────────
# 本页面可处于哪些视觉状态。每个状态有 source_node 指向其 Figma 帧作为设计证据。
# `regions` 中的组件树是共享的 — 组件通过 visible_when 与 states 按页面状态切换。

states:
  - id: "<state-id>"
    source_node: "<figma-frame-node-id>"

# ── 页面背景 ─────────────────────────────────────────────────
background:
  color: "#F2F7FA"                       # 设计中的页面背景填充色
  image: null                             # 背景图引用

# ── 区域 ────────────────────────────────────────────────────────
# 页面的单一组件树。Region 捕获开发者描述的页面级布局分区（如“自定义背景 / 头部 xxx / xxx”）。
# 每个 region 锚定到页面边缘或兄弟 region。

regions:
  - id: "<region-id>"
    name: "<语义名称，如 Header区域>"   # 人类可读
    source_node: "<figma-node-id>"
    safe_area: "top"                     # "top" | "bottom" — 仅当系统 UI 与本 region 边缘重叠时
    anchor:
      - to: "region"                         # screen_start | <region-id>
        direction: "start"                  # start | end | top | bottom — 附着到引用的哪条边
        offset: "0px"                     # auto | <Npx> — auto 时必须在 note 中说明计算方式
        note: null                       # offset 为 auto 时必填 — 偏移如何计算？
      - to: "region"                         # screen_end | <region-id>
        direction: "end"
        offset: "0px"
        note: null
      - to: "region"                         # screen_top | <region-id>
        direction: "top"
        offset: "0px"
        note: null
      - to: "region"                         # screen_bottom | <region-id>
        direction: "bottom"
        offset: "0px"
        note: null

    layout:
      direction: "vertical"              # vertical | horizontal | none
      align: "stretch"                   # start | center | end | stretch | space-between
      gap: "0px"                         # 子元素间距

    box:
      width: "fill"                      # auto | fill | <Npx> — 优先 auto；固定 px 须在 description 中说明原因
      height: "auto"                     # auto | <Npx>
      padding: { top: 0, right: "16px", bottom: 0, left: "16px" }  # 四向必填；无视觉间距时用 0

    background:
      color: null                        # 填充色
      image: null                        # 背景图引用

    # ── 组件（递归，任意层级）──────────────────────────────────
    children:
      - id: "<component-id>"
        type: "icon"                     # text | icon | image | button | input | list | container | custom
        name: "<人类可读名称>"
        source_node: "<figma-node-id>"
        visible_when: null               # 条件可见性，null = 始终可见

        description: null                # 实现提示；使用固定 width/height px 时必填 — 说明为何不能用 auto

        anchor:
          - to: "<parent-id>"             # parent | 兄弟组件 id | top | bottom
            direction: "start"
            offset: "0px"                 # auto | <Npx> — auto 时必须在 note 中说明
            note: null                    # offset 为 auto 时必填
          - to: "<parent-id>"
            direction: "end"
            offset: "0px"
            note: null
          - to: "<parent-id>"
            direction: "top"
            offset: "0px"
            note: null
          - to: "<parent-id>"
            direction: "bottom"
            offset: "0px"
            note: null

        layout:
          direction: "none"
          align: "center"
          gap: "0px"

        box:
          width: "auto"                   # auto | fill | <Npx> — 优先 auto；固定 px 须在 description 中说明
          height: "auto"                  # auto | <Npx>
          padding: { top: 0, right: 0, bottom: 0, left: 0 }  # 四向必填；无视觉间距时用 0

        background:
          color: null
          border: { radius: 0, width: 0, color: null }
          shadow: null
          opacity: 1.0

        # ── 内容（恰好填充一个插槽）─────────────────────────────
        text: null
        font:
          family: null
          size: null
          weight: null
          color: null
          height: null                   # 行高
          align: "center"                # start | center | end
        icon:
          src: null                      # 资源文件名
          size: null                     # 显示尺寸
        image:
          src: null
          width: null
          height: null
          fit: "cover"                   # cover | contain | fill | none

        interaction:
          on: null                       # click | long-press | none
          action: null                   # toast | navigate | toggle | submit | custom
          note: null                     # 自定义动作的说明

        states: {}                       # 按状态差异，如 { selected: { icon: { src: "ic_eye_s" } }, disabled: { opacity: 0.4 } }

        children: []                     # 递归 — 相同结构
