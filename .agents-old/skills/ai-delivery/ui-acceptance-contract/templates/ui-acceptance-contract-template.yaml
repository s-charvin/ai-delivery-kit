version: 1
updated_at: "<ISO8601>"
updated_by: "<agent>"

contract:
  id: "<subreq-id>"
  status: "acceptance_frozen"
  source_requirements:
    - "requirement-slice.md"
  source_design:
    figma_mapping: "figma-mapping.md"
    get_code_artifacts: []
    token_artifacts: []
    asset_artifacts: []
  api_dependency:
    required_for_screen_contract: false
    notes: "API truth affects later interaction or integration only when it does not change the frozen visual screen contract."

spacing_policy:
  padding: "Use for internal container breathing room."
  gap: "Use for sibling spacing owned by parent layout."
  margin: "Use only for external placement when parent layout cannot own spacing."
  equivalent_visuals_rule: "If padding and margin can create the same visual result, choose the semantic owner that best matches component responsibility and record that decision."

tree_extraction:
  source_node_id: "<executable-frame-node-id>"
  extraction_mode: "source-tree-first"
  evidence_artifacts:
    - "figma-mapping.md"
  wrapper_retention_policy:
    block_on_unfetched_descendants: true
    preserve_when:
      - "Node owns layout mode, axis, alignment, gap, wrap, constraints, or child order."
      - "Node owns padding, margin, clipping, mask, overflow, scroll, or viewport behavior."
      - "Node owns background, fill, border, radius, shadow, blur, opacity, elevation, or token mode."
      - "Node owns fixed sizing, responsive behavior, z-order, overlay, state styling, hit target, or asset boundary."
    collapse_allowed_when:
      - "Node owns no independent visual, layout, semantic, interaction, state, overflow, or asset truth."
      - "Removing the node does not change spacing, alignment, clipping, size, stacking, or source-backed order."
      - "The collapse is recorded with collapsed_source_node_ids and a concrete collapse_reason."
  audit:
    source_nodes_reviewed: []
    preserved_source_node_ids: []
    collapsed_source_node_ids: []
    blocked_source_node_ids: []
    notes: []

screen_states:
  - screen_state_id: "<screen-state-id>"
    state_type: "<idle|loading|empty|error|success|disabled|custom>"
    executable_frame_node_id: "<figma-node-id>"
    parent_shell_node_id: "<figma-node-id-or-null>"
    component_tree:
      component_id: "<root-component-id>"
      node_id: "<figma-node-id>"
      component_type: "screen"
      role: "<root-role>"
      required: true
      extraction:
        source_node_type: "<FRAME|INSTANCE|GROUP|TEXT|VECTOR|RECTANGLE|IMAGE|COMPONENT|unknown>"
        source_node_name: "<source node name>"
        wrapper_role: "semantic-component"
        retained_from_source_node_ids:
          - "<figma-node-id>"
        collapsed_source_node_ids: []
        retention_reason: "<why this source boundary must remain for 1:1 UI truth>"
        collapse_reason: null
        extraction_confidence: "<high|medium|blocked>"
      layout:
        mode: "<vertical-stack|horizontal-stack|grid|absolute|overlay|list|leaf>"
        primary_axis: "<vertical|horizontal|none>"
        cross_axis_alignment: "<stretch|center|start|end|none>"
        main_axis_alignment: "<start|center|end|space-between|none>"
        gap: "0px"
        positioning: "in-flow"
        wrap: false
        constraints: []
      box_model:
        padding:
          top: "0px"
          right: "0px"
          bottom: "0px"
          left: "0px"
        margin:
          top: "0px"
          right: "0px"
          bottom: "0px"
          left: "0px"
        spacing_semantics: "<who owns internal spacing, sibling spacing, and external placement>"
      size:
        width: null
        height: null
        width_behavior: "<fill-parent|hug-content|fixed|runtime>"
        height_behavior: "<fill-parent|hug-content|fixed|runtime>"
        min_width: null
        max_width: null
        min_height: null
        max_height: null
        aspect_ratio: null
      component_props: {}
      visual_style: {}
      content: {}
      typography: {}
      icon: {}
      image: {}
      states:
        required_states: []
        state_style_refs: {}
      implementation_mapping:
        preferred_component: null
        allowed_substitution: false
        prop_mapping: {}
      source_refs:
        - artifact: "figma-mapping.md"
          evidence: "<source-backed evidence sentence>"
      blocking_unknowns: []
      children:
        - component_id: "<child-component-id>"
          node_id: "<figma-node-id>"
          component_type: "<container|card|list|list-item|form|text|text-input|button|image|icon|tab|navigation|divider|badge|modal|sheet|toast|custom>"
          role: "<semantic-role>"
          required: true
          extraction:
            source_node_type: "<FRAME|INSTANCE|GROUP|TEXT|VECTOR|RECTANGLE|IMAGE|COMPONENT|unknown>"
            source_node_name: "<source node name>"
            wrapper_role: "<semantic-component|layout-wrapper|visual-wrapper|hit-target-wrapper|content-leaf|asset-leaf|decoration-only|implementation-noise>"
            retained_from_source_node_ids:
              - "<figma-node-id>"
            collapsed_source_node_ids: []
            retention_reason: "<why this source boundary remains or how it was safely folded>"
            collapse_reason: null
            extraction_confidence: "<high|medium|blocked>"
          layout:
            mode: "leaf"
            positioning: "in-flow"
          box_model:
            padding:
              top: "0px"
              right: "0px"
              bottom: "0px"
              left: "0px"
            margin:
              top: "0px"
              right: "0px"
              bottom: "0px"
              left: "0px"
            spacing_semantics: "Leaf spacing is owned by parent unless source evidence says otherwise."
          size:
            width_behavior: "hug-content"
            height_behavior: "hug-content"
          component_props: {}
          visual_style: {}
          content: {}
          typography: {}
          icon: {}
          image: {}
          states:
            required_states:
              - "default"
            state_style_refs: {}
          implementation_mapping:
            preferred_component: null
            allowed_substitution: false
            prop_mapping: {}
          source_refs: []
          blocking_unknowns: []
          children: []

verification_targets:
  - screen_state_id: "<screen-state-id>"
    golden_name: "<golden-name>"
    screenshot_size: "<width>x<height>"
    artifact_refs:
      - "figma-mapping.md"
      - "ui-acceptance-contract.yaml"
    manual_side_by_side_points:
      - "<specific 1:1 visual comparison point>"

unresolved_ui_truth:
  - unknown: "<missing visual/component/layout/style/icon truth>"
    affected_component: "<component-id>"
    impact: "<why implementation or verification cannot be frozen>"
    resolution_path: "<fetch get_code/download asset/request design clarification/user-provided asset>"
    blocks: "<acceptance_frozen|interaction_design|none>"
