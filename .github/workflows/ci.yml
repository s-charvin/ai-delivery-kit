name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install zsh on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run Unix release rehearsal
        if: runner.os != 'Windows'
        run: AI_DELIVERY_RUN_GORELEASER=never AI_DELIVERY_RUN_PWSH=never bash scripts/rehearse-release.sh

      - name: Validate PowerShell script syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile("scripts/install-ai-delivery.ps1", [ref]$null, [ref]$null)
          $null = [System.Management.Automation.Language.Parser]::ParseFile("scripts/bootstrap-ai-delivery.ps1", [ref]$null, [ref]$null)

  prerelease-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Run release rehearsal gates
        run: AI_DELIVERY_RUN_GORELEASER=never AI_DELIVERY_RUN_PWSH=never bash scripts/rehearse-release.sh

      - name: Run GoReleaser snapshot check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean --skip=publish
