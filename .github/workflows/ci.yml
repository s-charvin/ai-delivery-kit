name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run Go tests
        run: go test ./...

      - name: Run bootstrap smoke test
        if: runner.os != 'Windows'
        run: bash tests/ai-delivery-cli/bootstrap-script.test.sh

      - name: Run install smoke test
        if: runner.os != 'Windows'
        run: bash tests/ai-delivery-cli/install-script.test.sh

      - name: Run legacy bootstrap compatibility test
        if: runner.os != 'Windows'
        run: zsh tests/ai-delivery-skills/bootstrap-project.test.sh

      - name: Validate PowerShell script syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $null = [System.Management.Automation.Language.Parser]::ParseFile("scripts/install-ai-delivery.ps1", [ref]$null, [ref]$null)
          $null = [System.Management.Automation.Language.Parser]::ParseFile("scripts/bootstrap-ai-delivery.ps1", [ref]$null, [ref]$null)

  prerelease-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run GoReleaser snapshot check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean --skip=publish
